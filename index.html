<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OOUX Model Tool — Global View Systems</title>
  <style>
    :root {
      /* Brand palette — see assets/palette.md (source of truth) */
      --sunset-light: #FFECC6;
      --sunset:       #FEC042;
      --sunset-dark:  #987328;
      --midnight-light: #BFC0C6;
      --midnight:       #2B2D42;
      --midnight-dark:  #1A1B28;
      --ocean-light:  #CAE4E4;
      --ocean:        #4FA6A4;
      --ocean-dark:   #2F615F;
      --coral-light:  #FBD8C4;
      --coral:        #F27D39;
      --coral-dark:   #8B421D;
      --cream-light:  #FFFDF7;
      --cream:        #FFF7E4;
      --cream-dark:   #999489;
      --grey-light:   #C9C9C9;
      --grey:         #4A4A4A;
      --grey-dark:    #2C2C2C;

      /* Semantic tokens mapped onto the brand palette */
      --colour-bg: var(--midnight-dark);
      --colour-surface: var(--midnight);
      --colour-border: #3d3f57;
      --colour-text: var(--cream);
      --colour-text-muted: var(--midnight-light);
      --colour-accent: var(--sunset);
      --colour-on-accent: var(--midnight-dark);
      --colour-danger: var(--coral);
      --colour-success: var(--ocean);
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-sans);
      background: var(--colour-bg);
      color: var(--colour-text);
      height: 100vh;
      overflow: hidden;
    }

    /* --- Nav --- */
    #nav {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 16px;
      background: var(--colour-surface);
      border-bottom: 1px solid var(--colour-border);
    }
    #nav .brand { font-weight: 600; margin-right: auto; }
    #nav .brand small { color: var(--colour-text-muted); font-weight: 400; margin-left: 8px; }
    #nav button {
      background: transparent;
      color: var(--colour-text-muted);
      border: 1px solid var(--colour-border);
      padding: 6px 14px;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 13px;
    }
    #nav button.is-active { background: var(--colour-accent); color: var(--colour-on-accent); border-color: var(--colour-accent); font-weight: 600; }
    #model-select {
      background: var(--colour-bg); color: var(--colour-text);
      border: 1px solid var(--colour-border); border-radius: var(--radius-md);
      padding: 6px 10px; font-size: 13px; cursor: pointer; margin-right: 8px;
    }
    #nav button.action { color: var(--colour-text); }
    #nav button:hover { color: var(--colour-text); }

    main { position: relative; height: calc(100vh - 53px); }

    /* --- Canvas view --- */
    #view-canvas { position: absolute; inset: 0; }
    #graph-canvas { width: 100%; height: 100%; display: block; cursor: grab; }
    .canvas-controls {
      position: absolute; top: 12px; left: 12px;
      display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
      background: var(--colour-surface); border: 1px solid var(--colour-border);
      border-radius: var(--radius-md); padding: 6px;
    }
    .canvas-controls button {
      background: var(--colour-bg); color: var(--colour-text);
      border: 1px solid var(--colour-border); border-radius: var(--radius-sm);
      padding: 4px 10px; cursor: pointer; font-size: 13px;
    }
    .canvas-tier-filter { display: flex; gap: 8px; padding-left: 8px; font-size: 12px; color: var(--colour-text-muted); }
    .canvas-tier-filter label { display: flex; align-items: center; gap: 3px; cursor: pointer; }
    .canvas-tooltip {
      position: absolute; pointer-events: none; z-index: 5;
      background: #000; color: #fff; font-size: 12px;
      padding: 4px 8px; border-radius: var(--radius-sm); white-space: nowrap;
    }

    /* --- Cards view --- */
    #view-cards { position: absolute; inset: 0; overflow-y: auto; padding: 16px; }
    .cards-toolbar { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
    .cards-toolbar input[type="search"] {
      background: var(--colour-surface); border: 1px solid var(--colour-border);
      color: var(--colour-text); padding: 8px 12px; border-radius: var(--radius-md); min-width: 220px;
    }
    .filter-tiers, .filter-priorities { display: flex; gap: 6px; }
    .filter-priorities .check { display: flex; align-items: center; gap: 3px; font-size: 13px; color: var(--colour-text-muted); }
    .pill {
      background: var(--colour-surface); color: var(--colour-text-muted);
      border: 1px solid var(--colour-border); border-radius: 999px;
      padding: 4px 12px; cursor: pointer; font-size: 12px;
    }
    .pill.is-on { background: var(--colour-accent); color: var(--colour-on-accent); border-color: var(--colour-accent); font-weight: 600; }
    .filter-clear { background: transparent; color: var(--colour-danger); border: none; cursor: pointer; font-size: 13px; }

    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .tier-header {
      grid-column: 1 / -1; position: sticky; top: -16px; z-index: 2;
      margin: 8px 0 0; padding: 6px 0; font-size: 12px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--colour-text-muted); background: var(--colour-bg);
    }
    .card {
      position: relative; background: var(--colour-surface);
      border: 1px solid var(--colour-border); border-radius: var(--radius-lg);
      overflow: hidden; cursor: pointer; display: flex; flex-direction: column;
    }
    .card.is-selected { border: 2px solid var(--card-colour); }
    .card-bar { height: 4px; background: var(--card-colour); }
    .card-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px 0; }
    .card-head h3 { margin: 0; font-size: 15px; }
    .tier-pill {
      font-size: 11px; padding: 2px 8px; border-radius: 999px;
      color: var(--card-colour); background: color-mix(in srgb, var(--card-colour) 20%, transparent);
    }
    .card-desc { padding: 4px 14px 0; margin: 0; font-size: 13px; color: var(--colour-text-muted); }
    .card-section { padding: 10px 14px 0; }
    .card-section h4 { margin: 0 0 4px; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--colour-text-muted); }
    .card-section ul { margin: 0; padding-left: 16px; font-size: 13px; }
    .card-section .muted, .muted { color: var(--colour-text-muted); }
    .cta-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .cta-tag { font-size: 11px; padding: 3px 8px; border-radius: var(--radius-sm); background: var(--colour-bg); border: 1px solid var(--colour-border); }
    .rel-list { list-style: none; padding-left: 0 !important; }
    .card-edit {
      margin: 12px 14px 14px; padding: 8px; border-radius: var(--radius-md);
      background: var(--colour-bg); color: var(--colour-text);
      border: 1px solid var(--colour-border); cursor: pointer;
    }
    .card-edit:hover { border-color: var(--colour-accent); }

    /* --- CRUD panel --- */
    #panel-crud {
      position: fixed; top: 0; right: 0; height: 100vh; width: 380px;
      background: var(--colour-surface); border-left: 1px solid var(--colour-border);
      display: flex; flex-direction: column; z-index: 10;
      box-shadow: -8px 0 24px rgba(0,0,0,0.3);
    }
    .crud-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--colour-border); }
    .crud-header h2 { margin: 0; font-size: 16px; }
    .crud-close { background: transparent; border: none; color: var(--colour-text-muted); font-size: 18px; cursor: pointer; }
    .crud-tabs { display: flex; border-bottom: 1px solid var(--colour-border); }
    .crud-tab { flex: 1; background: transparent; border: none; color: var(--colour-text-muted); padding: 10px 4px; cursor: pointer; font-size: 12px; border-bottom: 2px solid transparent; }
    .crud-tab.is-active { color: var(--colour-text); border-bottom-color: var(--colour-accent); }
    .crud-tab:disabled { opacity: 0.4; cursor: not-allowed; }
    .crud-body { flex: 1; overflow-y: auto; padding: 16px; }
    .crud-field { display: block; margin-bottom: 14px; }
    .crud-label { display: block; font-size: 12px; color: var(--colour-text-muted); margin-bottom: 4px; }
    .crud-field input, .crud-field textarea, .crud-field select,
    .crud-row input, .crud-row select {
      width: 100%; background: var(--colour-bg); color: var(--colour-text);
      border: 1px solid var(--colour-border); border-radius: var(--radius-sm); padding: 8px;
    }
    .crud-field input[type="color"] { height: 38px; padding: 2px; }
    .crud-subhead { font-size: 13px; margin: 16px 0 8px; }
    .crud-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
    .crud-row .check { display: flex; align-items: center; gap: 2px; font-size: 11px; color: var(--colour-text-muted); }
    .crud-rel-row { display: flex; justify-content: space-between; gap: 8px; padding: 8px; border: 1px solid var(--colour-border); border-radius: var(--radius-sm); margin-bottom: 6px; font-size: 13px; }
    .crud-rel-form { border: 1px dashed var(--colour-border); border-radius: var(--radius-md); padding: 12px; margin-top: 8px; }
    .crud-add { width: 100%; margin-top: 8px; background: var(--colour-bg); color: var(--colour-text); border: 1px dashed var(--colour-border); border-radius: var(--radius-md); padding: 8px; cursor: pointer; }
    .crud-del { background: transparent; border: none; color: var(--colour-danger); cursor: pointer; font-size: 14px; }
    .crud-footer { display: flex; gap: 8px; padding: 14px 16px; border-top: 1px solid var(--colour-border); }
    .btn-save { flex: 1; background: var(--colour-accent); color: var(--colour-on-accent); border: none; border-radius: var(--radius-md); padding: 10px; cursor: pointer; font-weight: 600; }
    .btn-delete { background: transparent; color: var(--colour-danger); border: 1px solid var(--colour-danger); border-radius: var(--radius-md); padding: 10px 14px; cursor: pointer; }

    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <nav id="nav">
    <span class="brand">OOUX Model Tool <small id="model-name"></small></span>
    <select id="model-select" title="Switch model"></select>
    <button id="tab-canvas" class="is-active">Canvas</button>
    <button id="tab-cards">Cards</button>
    <button id="btn-new" class="action">+ New Object</button>
    <button id="btn-export" class="action">Export JSON</button>
  </nav>
  <main>
    <div id="view-canvas"><canvas id="graph-canvas"></canvas></div>
    <div id="view-cards" hidden></div>
    <aside id="panel-crud" hidden></aside>
  </main>

  <script type="module">
    // main — bootstraps the app: load manifest + model, init views, wire nav
    import { loadManifest, loadModel, saveModel } from './src/data.js';
    import * as canvas from './src/canvas.js';
    import * as cards from './src/cards.js';
    import * as crud from './src/crud.js';
    import * as state from './src/state.js';
    import { log } from './src/utils.js';

    const views = {
      canvas: document.getElementById('view-canvas'),
      cards: document.getElementById('view-cards'),
    };
    const tabs = {
      canvas: document.getElementById('tab-canvas'),
      cards: document.getElementById('tab-cards'),
    };
    const select = document.getElementById('model-select');

    function switchView(name) {
      Object.entries(views).forEach(([k, el]) => { el.hidden = k !== name; });
      Object.entries(tabs).forEach(([k, el]) => el.classList.toggle('is-active', k === name));
    }

    tabs.canvas.onclick = () => switchView('canvas');
    tabs.cards.onclick = () => switchView('cards');
    document.getElementById('btn-new').onclick = () => crud.open(null);
    document.getElementById('btn-export').onclick = () => saveModel();

    function entryFor(manifest, id) {
      return manifest.models.find((m) => m.id === id) || manifest.models[0];
    }

    // Load a model by manifest entry; views re-render via state:model-updated.
    async function applyModel(entry) {
      const model = await loadModel(entry.file);
      document.getElementById('model-name').textContent = `— ${model.meta.client}`;
      return model;
    }

    (async function start() {
      try {
        const manifest = await loadManifest();
        manifest.models.forEach((m) => {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = m.name;
          select.appendChild(opt);
        });
        const startId = manifest.default || manifest.models[0].id;
        select.value = startId;

        const model = await applyModel(entryFor(manifest, startId));
        canvas.init(document.getElementById('graph-canvas'), model);
        cards.init(views.cards, model);
        crud.init(document.getElementById('panel-crud'));
        switchView('canvas');

        select.onchange = async () => {
          crud.close();
          state.select(null);
          await applyModel(entryFor(manifest, select.value));
        };
      } catch (err) {
        log('error', 'startup failed', err);
        document.body.insertAdjacentHTML('afterbegin',
          `<pre style="color:#ef4444;padding:16px">Failed to load models — serve over http(s), not file://.\n${err}</pre>`);
      }
    })();
  </script>
</body>
</html>
